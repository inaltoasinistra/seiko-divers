<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seiko Automatic Divers</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── IMAGE CONVENTION ──────────────────────────────────────────────────────────
    // images/<ref>/front.jpg|png   — front / dial view  (required)
    // images/<ref>/profile.jpg|png — side profile view  (optional)
    // <ref> = refs[0].toLowerCase(). jpg is tried first, then png.
    function imgPath(w, view) {
      return `images/${w.refs[0].toLowerCase()}/${view}`;   // no extension — WatchImg appends
    }

    // ── WATCH DATA ────────────────────────────────────────────────────────────────
    const watches = [
      {
        cat: "1965", name: "1965 Heritage Diver 300m",
        sub: "Cal. 6R55 · 72h · 40mm", refs: ["SPB451", "SPB511"],
        wr: "300m", wrColor: "#4ade80", price: "~€1.200", priceNote: "USA $1.300",
      },
      {
        cat: "1965", name: "1965 Heritage Diver 200m",
        sub: "Cal. 6R35 · 70h · 40.5mm", refs: ["SPB239", "SPB149", "SPB121"],
        wr: "200m", wrColor: "#60a5fa", price: "~€750", priceNote: "USA $725",
      },
      {
        cat: "1968", name: "1968 Heritage GMT",
        sub: "Cal. 6R54 · 72h · 42mm · GMT", refs: ["SPB381", "SPB383"],
        wr: "200m", wrColor: "#60a5fa", price: "~€950", priceNote: "USA $995",
      },
      {
        cat: "1968", name: "1968 Heritage GMT Save the Ocean",
        sub: "Cal. 6R54 · 72h · 42mm · GMT", refs: ["SPB385"],
        wr: "200m", wrColor: "#60a5fa", price: "—", priceNote: "Limited Ed. · 110° Ann.",
      },
      {
        cat: "1968", name: "1968 Heritage GMT 60° Ann.",
        sub: "Cal. 6R54 · 72h · 42mm · Wave", refs: ["SPB509", "SPB513"],
        wr: "200m", wrColor: "#60a5fa", price: "~€1.400", priceNote: "Limited Ed.",
      },
      {
        cat: "sumo", name: "Sumo",
        sub: "Cal. 6R35 · 70h · 45mm", refs: ["SPB321", "SPB323", "SPB325"],
        wr: "200m", wrColor: "#60a5fa", price: "~€1.250", priceNote: "",
      },
      {
        cat: "sumo", name: "Sumo Black Series",
        sub: "Cal. 6R35 · 70h · 45mm · PVD", refs: ["SPB433"],
        wr: "200m", wrColor: "#4ade80", price: "~€1.300", priceNote: "Limited Ed.",
      },
      {
        cat: "samurai", name: "Samurai (2024)",
        sub: "Cal. 4R35 · 41h · 41.7mm", refs: ["SRPL11", "SRPL13", "SRPL15"],
        wr: "200m", wrColor: "#60a5fa", price: "~€550", priceNote: "",
      },
      {
        cat: "samurai", name: "Samurai PADI",
        sub: "Cal. 4R35 · 41h · 41.7mm", refs: ["SRPL51", "SRPL53"],
        wr: "200m", wrColor: "#60a5fa", price: "~€650", priceNote: "",
      },
      {
        cat: "marinemaster", name: "Marinemaster 1965 Modern",
        sub: "Cal. 6L37 · 45h · 39.5mm", refs: ["SJE097", "SJE099", "SJE101"],
        wr: "200m", wrColor: "#60a5fa", price: "~€1.500", priceNote: "",
      },
      {
        cat: "marinemaster", name: "Marinemaster 1968 300m",
        sub: "Cal. 8L45 Hi-Beat · 72h · 44mm", refs: ["SLA077", "SLA079", "HBF001"],
        wr: "300m", wrColor: "#4ade80", price: "~€2.700", priceNote: "$2.900 SLA079\n$3.600 HBF001",
      },
      {
        cat: "marinemaster", name: "Marinemaster Professional",
        sub: "Cal. 8L45 Hi-Beat · 72h · Titanium", refs: ["SLA081"],
        wr: "600m", wrColor: "#e879f9", price: "~€4.200", priceNote: "USA $4.600",
      },
      {
        cat: "baby-tuna", name: "Baby Tuna",
        sub: "Cal. 4R36 · 41h · 47.8mm Shroud", refs: ["SRPF03", "SRPF05", "SRPF07"],
        wr: "200m", wrColor: "#60a5fa", price: "~€450", priceNote: "",
      },
      {
        cat: "monster", name: "Monster",
        sub: "Cal. 4R36 · 41h · 44mm", refs: ["SRPD27", "SRPD25"],
        wr: "200m", wrColor: "#60a5fa", price: "~€400", priceNote: "",
      },
    ];

    const CATS = [
      { id: "all", label: "All" },
      { id: "1965", label: "1965 Heritage" },
      { id: "1968", label: "1968 Heritage" },
      { id: "sumo", label: "Sumo" },
      { id: "samurai", label: "Samurai" },
      { id: "marinemaster", label: "Marinemaster" },
      { id: "baby-tuna", label: "Baby Tuna" },
      { id: "monster", label: "Monster" },
    ];

    // Renders an image with an inline placeholder when the file is missing.
    // src is a path without extension; tries .jpg then .png before giving up.
    const EXTS = ["jpg", "png"];
    function WatchImg({ src, alt, style }) {
      const [extIdx, setExtIdx] = useState(0);
      useEffect(() => { setExtIdx(0); }, [src]);
      if (extIdx >= EXTS.length) return (
        <div style={{ ...style, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "#111", color: "#333", gap: 4, fontSize: "0.6rem", letterSpacing: "0.05em" }}>
          <span style={{ fontSize: "1.6rem" }}>⌚</span>
          <span>N/D</span>
        </div>
      );
      return <img src={`${src}.${EXTS[extIdx]}`} alt={alt} onError={() => setExtIdx(i => i + 1)} style={style} />;
    }

    function WatchThumbnail({ w, onClick }) {
      return (
        <div style={{ display: "flex", gap: 8 }}>
          {["front", "profile"].map(view => (
            <div key={view}
              onClick={() => onClick(view)}
              style={{ width: 350, height: 350, borderRadius: 10, border: "1px solid #2a2a3a", overflow: "hidden", cursor: "zoom-in", background: "#111", flexShrink: 0, transition: "border-color .15s" }}
              onMouseEnter={e => e.currentTarget.style.borderColor = "#c9a84c"}
              onMouseLeave={e => e.currentTarget.style.borderColor = "#2a2a3a"}
            >
              <WatchImg
                src={imgPath(w, view)}
                alt={`${w.name} — ${view}`}
                style={{ width: "100%", height: "100%", objectFit: "cover" }}
              />
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const [cat, setCat] = useState("all");
      const [modal, setModal] = useState(null);
      const filtered = cat === "all" ? watches : watches.filter(w => w.cat === cat);

      return (
        <div style={{ background: "#0a0a0f", minHeight: "100vh", padding: "2rem 1rem", fontFamily: "'Segoe UI',system-ui,sans-serif", color: "#e8e8e8" }}>

          <div style={{ textAlign: "center", marginBottom: "2rem" }}>
            <h1 style={{ fontSize: "1.8rem", fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "#fff" }}>
              Seiko <span style={{ color: "#c9a84c" }}>Diver</span> Automatics
            </h1>
            <p style={{ color: "#555", fontSize: "0.78rem", marginTop: "0.4rem" }}>
              Prospex · automatic movements · Turtle excluded · indicative retail prices
            </p>
          </div>

          <div style={{ display: "flex", flexWrap: "wrap", gap: "0.4rem", justifyContent: "center", marginBottom: "1.8rem" }}>
            {CATS.map(c => (
              <button key={c.id} onClick={() => setCat(c.id)} style={{
                background: cat === c.id ? "#c9a84c" : "#1a1a25",
                border: `1px solid ${cat === c.id ? "#c9a84c" : "#333"}`,
                color: cat === c.id ? "#000" : "#aaa",
                fontWeight: cat === c.id ? 700 : 400,
                padding: "0.35rem 0.9rem", borderRadius: 20, cursor: "pointer", fontSize: "0.8rem"
              }}>{c.label}</button>
            ))}
          </div>

          <div style={{ overflowX: "auto", borderRadius: 12, border: "1px solid #1e1e2a" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 1100 }}>
              <thead>
                <tr style={{ background: "#111118", borderBottom: "1px solid #2a2a3a" }}>
                  {["#", "Model", "References", "Photo", "Specs", "Price"].map(h => (
                    <th key={h} style={{ padding: "0.85rem 0.9rem", textAlign: "left", fontSize: "0.68rem", textTransform: "uppercase", letterSpacing: "0.1em", color: "#c9a84c", fontWeight: 600, whiteSpace: "nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((w, i) => (
                  <tr key={w.name} style={{ borderBottom: "1px solid #14141e" }}
                    onMouseOver={e => e.currentTarget.style.background = "#0d0d16"}
                    onMouseOut={e => e.currentTarget.style.background = "transparent"}
                  >
                    <td style={{ padding: "0.85rem 0.9rem", color: "#333", fontSize: "0.72rem", fontFamily: "monospace" }}>
                      {String(i + 1).padStart(2, "0")}
                    </td>
                    <td style={{ padding: "0.85rem 0.9rem", minWidth: 165 }}>
                      <div style={{ fontWeight: 700, fontSize: "0.86rem", color: "#eee" }}>{w.name}</div>
                      <div style={{ fontSize: "0.7rem", color: "#777", marginTop: "0.2rem" }}>{w.sub}</div>
                      <span style={{
                        display: "inline-block", marginTop: "0.3rem", fontSize: "0.62rem",
                        padding: "0.08rem 0.4rem", borderRadius: 10, fontWeight: 700,
                        color: w.wrColor, background: w.wrColor + "15", border: `1px solid ${w.wrColor}33`
                      }}>{w.wr}</span>
                    </td>
                    <td style={{ padding: "0.85rem 0.9rem", minWidth: 115 }}>
                      {w.refs.map(r => (
                        <span key={r} style={{
                          display: "inline-block", margin: "2px 2px 2px 0",
                          fontFamily: "monospace", fontSize: "0.7rem", color: "#c9a84c",
                          background: "#1a160a", padding: "0.1rem 0.4rem",
                          borderRadius: 4, border: "1px solid #33280e", whiteSpace: "nowrap"
                        }}>{r}</span>
                      ))}
                    </td>
                    <td style={{ padding: "0.85rem 0.9rem" }}>
                      <WatchThumbnail w={w} onClick={view => setModal({ w, view })} />
                    </td>
                    <td style={{ padding: "0.85rem 0.9rem", fontSize: "0.7rem", color: "#888", lineHeight: 1.9, minWidth: 135 }}>
                      {w.sub.split("·").map((s, si) => (
                        <div key={si}><span style={{ color: "#333" }}>▸</span> {s.trim()}</div>
                      ))}
                    </td>
                    <td style={{ padding: "0.85rem 0.9rem", minWidth: 100 }}>
                      <div style={{ fontWeight: 800, fontSize: "1rem", color: "#c9a84c", fontFamily: "monospace", letterSpacing: "-0.02em" }}>{w.price}</div>
                      {w.priceNote && (
                        <div style={{ fontSize: "0.65rem", color: "#555", marginTop: "0.3rem", lineHeight: 1.5, whiteSpace: "pre-line" }}>{w.priceNote}</div>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <p style={{ textAlign: "center", color: "#333", fontSize: "0.7rem", marginTop: "1rem" }}>
            {filtered.length} models · indicative EU retail prices · click to enlarge
          </p>

          {modal && (
            <div onClick={() => setModal(null)}
              style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.97)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", padding: "3rem" }}>
              <button onClick={() => setModal(null)}
                style={{ position: "fixed", top: "1rem", right: "1rem", background: "#c9a84c", color: "#000", border: "none", width: 36, height: 36, borderRadius: "50%", fontSize: "1.1rem", cursor: "pointer", fontWeight: 700, zIndex: 1 }}>✕</button>
              <WatchImg
                src={imgPath(modal.w, modal.view)}
                alt={`${modal.w.name} — ${modal.view}`}
                style={{ maxWidth: "100%", maxHeight: "100%", objectFit: "contain", borderRadius: 8 }}
              />
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
